<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8">
    <title>eLEARNING - Mock Test Series</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .question-palette .btn {
            width: 40px;
            height: 40px;
            margin: 4px;
            font-weight: bold;
        }

        .q-answered {
            background-color: #28a745;
            color: white;
            border: none;
        }

        .q-unanswered {
            background-color: #dc3545;
            color: white;
            border: none;
        }

        .q-marked {
            background-color: #ffc107;
            color: black;
            border: none;
        }

        .q-unvisited {
            background-color: #e9ecef;
            color: black;
            border: 1px solid #ced4da;
        }
    </style>
    <link href="css/dark-mode.css" rel="stylesheet">
</head>

<body>
    <!-- Spinner Start -->
    <div id="spinner"
        class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>
    <!-- Spinner End -->


    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
        <a href="/" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
            <h2 class="m-0 text-primary"><i class="fa fa-book me-3"></i>Learn Nova</h2>
        </a>
        <div class="ms-auto p-4 p-lg-0 d-flex align-items-center me-4">
            <button type="button" id="darkModeToggle" class="btn btn-link text-dark mx-3 dark-mode-toggle"><i
                    class="fas fa-moon fs-5"></i></button>
            <div class="bg-primary text-white px-3 py-2 rounded fw-bold d-none d-md-block">
                <i class="fa fa-clock me-2"></i>Time Left: 01:29:45
            </div>
            <a href="/dashboard" class="btn btn-outline-primary ms-3">Exit Test</a>
        </div>
    </nav>
    <!-- Navbar End -->

    <!-- Test Area Start -->
    <div class="container-fluid py-5 bg-light h-100" style="min-height: calc(100vh - 75px);">
        <div class="container-xxl">
            <div class="row g-4">

                <!-- Main Question Area -->
                <div class="col-lg-8 wow fadeInUp" data-wow-delay="0.1s">
                    <div class="bg-white rounded p-4 p-sm-5 shadow-sm h-100">
                        <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                            <h4 class="mb-0">Question 1</h4>
                            <span class="badge bg-primary px-3 py-2 rounded-pill">+4 Marks, -1 Negative</span>
                        </div>

                        <div class="question-text mb-4">
                            <h5 class="lh-base">Which of the following is not a valid CSS property for Flexbox
                                container?</h5>
                        </div>

                        <div class="options">
                            <div class="form-check p-3 border rounded mb-3 bg-light custom-radio">
                                <input class="form-check-input ms-0 me-3 mt-1" type="radio" name="flexboxQuestion"
                                    id="optionA">
                                <label class="form-check-label w-100 stretched-link" for="optionA">
                                    A. justify-content
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded mb-3 bg-light custom-radio">
                                <input class="form-check-input ms-0 me-3 mt-1" type="radio" name="flexboxQuestion"
                                    id="optionB">
                                <label class="form-check-label w-100 stretched-link" for="optionB">
                                    B. align-items
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded mb-3 bg-light custom-radio">
                                <input class="form-check-input ms-0 me-3 mt-1" type="radio" name="flexboxQuestion"
                                    id="optionC">
                                <label class="form-check-label w-100 stretched-link" for="optionC">
                                    C. align-self
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded mb-3 bg-light custom-radio">
                                <input class="form-check-input ms-0 me-3 mt-1" type="radio" name="flexboxQuestion"
                                    id="optionD">
                                <label class="form-check-label w-100 stretched-link" for="optionD">
                                    D. flex-direction
                                </label>
                            </div>
                        </div>

                        <div class="d-flex flex-wrap justify-content-between mt-5 pt-3 border-top gap-2">
                            <button class="btn btn-secondary px-4">Clear Response</button>
                            <div>
                                <button class="btn btn-outline-warning px-4 me-2">Mark for Review & Next</button>
                                <button class="btn btn-primary px-5">Save & Next</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Sidebar (Question Palette) -->
                <div class="col-lg-4 wow fadeInUp" data-wow-delay="0.3s">
                    <div class="bg-white rounded p-4 shadow-sm h-100">
                        <!-- Student Info -->
                        <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                            <img src="img/testimonial-1.jpg" class="rounded-circle me-3"
                                style="width: 50px; height: 50px; object-fit: cover;" alt="">
                            <div>
                                <h6 class="mb-0">Aarav Sharma</h6>
                                <small class="text-muted">SSC CGL Mock Test #1</small>
                            </div>
                        </div>

                        <!-- Legend -->
                        <div class="row g-2 mb-4 text-center" style="font-size: 0.85rem;">
                            <div class="col-6 d-flex align-items-center"><span class="btn btn-sm q-answered p-0 me-2"
                                    style="width: 20px; height: 20px;"></span> Answered</div>
                            <div class="col-6 d-flex align-items-center"><span class="btn btn-sm q-unanswered p-0 me-2"
                                    style="width: 20px; height: 20px;"></span> Not Answered</div>
                            <div class="col-6 d-flex align-items-center"><span class="btn btn-sm q-unvisited p-0 me-2"
                                    style="width: 20px; height: 20px;"></span> Not Visited</div>
                            <div class="col-6 d-flex align-items-center"><span class="btn btn-sm q-marked p-0 me-2"
                                    style="width: 20px; height: 20px;"></span> Marked</div>
                        </div>

                        <h6 class="mb-3">Section: General Intelligence</h6>

                        <!-- Palette Grid -->
                        <div class="question-palette mb-4 d-flex flex-wrap justify-content-start">
                            <button class="btn q-answered">1</button>
                            <button class="btn q-answered">2</button>
                            <button class="btn q-unanswered">3</button>
                            <button class="btn q-marked">4</button>
                            <button class="btn q-answered">5</button>
                            <button class="btn q-unvisited">6</button>
                            <button class="btn q-unvisited">7</button>
                            <button class="btn q-unvisited">8</button>
                            <button class="btn q-unvisited">9</button>
                            <button class="btn q-unvisited">10</button>
                            <button class="btn q-unvisited">11</button>
                            <button class="btn q-unvisited">12</button>
                            <button class="btn q-unvisited">13</button>
                            <button class="btn q-unvisited">14</button>
                            <button class="btn q-unvisited">15</button>
                        </div>

                        <div class="pt-3 border-top mt-auto">
                            <button class="btn btn-success w-100 py-3 fw-bold shadow-sm"
                                onclick="alert('Test submitted successfully! Redirecting to results...')">Submit
                                Test</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <!-- Test Area End -->

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>

    <!-- Custom styling behavior for radio buttons in test -->
    <script>
        $(document).ready(function () {
            // Remove spinner immediately for test page
            setTimeout(function () {
                if ($('#spinner').length > 0) {
                    $('#spinner').removeClass('show');
                }
            }, 100);

            // Highlight selected option
            $('.options .form-check').click(function () {
                $('.options .form-check').removeClass('border-primary shadow-sm');
                var radioBtn = $(this).find('input[type="radio"]');
                radioBtn.prop('checked', true);
                if (radioBtn.is(':checked')) {
                    $(this).addClass('border-primary shadow-sm');
                }
            });
        });
    </script>
    <script src="js/dark-mode.js"></script>
</body>

</html>
