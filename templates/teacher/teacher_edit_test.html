<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1K34ZCR5M7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-1K34ZCR5M7');
    </script>
    <meta charset="utf-8">
    <title>LearnNova - Edit Test</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/favicon.ico" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="/lib/animate/animate.min.css" rel="stylesheet">
    <link href="/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/dark-mode.css" rel="stylesheet">
</head>

<body>
    <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>

    <!-- Navbar Start -->
    <nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
        <a href="/" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
            <h2 class="m-0 text-primary"><i class="fa fa-book me-3"></i>Learn Nova</h2>
        </a>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a href="/teacher/dashboard" class="nav-item nav-link">Teacher Dashboard</a>
                <a href="/teacher/tests" class="nav-item nav-link">My Tests</a>
            </div>
            {% if current_user.is_authenticated %}
            <a href="/logout" class="btn btn-outline-danger py-4 px-lg-5">Logout</a>
            {% endif %}
        </div>
    </nav>

    <!-- Header Start -->
    <div class="container-fluid bg-primary py-5 mb-5 page-header">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-10 text-center">
                    <h1 class="display-3 text-white animated slideInDown">Edit Test</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Test Form Start -->
    <div class="container-xxl py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="bg-light rounded p-4 p-lg-5">
                        <h3 class="mb-4">Test Details</h3>
                        <form method="POST" action="/teacher/test/{{ test.id }}/edit">
                            <div class="row g-3">
                                <div class="col-12">
                                    <div class="form-floating">
                                        <input type="text" class="form-control" id="title" name="title" value="{{ test.title }}" required>
                                        <label for="title">Test Title</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-floating">
                                        <textarea class="form-control" id="description" name="description" style="height: 100px;">{{ test.description }}</textarea>
                                        <label for="description">Description</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select" id="category" name="category">
                                            <option value="upsc" {% if test.category == 'upsc' %}selected{% endif %}>UPSC</option>
                                            <option value="ssc" {% if test.category == 'ssc' %}selected{% endif %}>SSC</option>
                                            <option value="banking" {% if test.category == 'banking' %}selected{% endif %}>Banking</option>
                                            <option value="programming" {% if test.category == 'programming' %}selected{% endif %}>Programming</option>
                                            <option value="other" {% if test.category == 'other' %}selected{% endif %}>Other</option>
                                        </select>
                                        <label for="category">Category</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <select class="form-select" id="difficulty" name="difficulty">
                                            <option value="easy" {% if test.difficulty == 'easy' %}selected{% endif %}>Easy</option>
                                            <option value="medium" {% if test.difficulty == 'medium' %}selected{% endif %}>Medium</option>
                                            <option value="hard" {% if test.difficulty == 'hard' %}selected{% endif %}>Hard</option>
                                        </select>
                                        <label for="difficulty">Difficulty</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="duration_minutes" name="duration_minutes" value="{{ test.duration_minutes }}" min="1">
                                        <label for="duration_minutes">Duration (minutes)</label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-floating">
                                        <input type="number" class="form-control" id="passing_marks" name="passing_marks" value="{{ test.passing_marks }}" min="0">
                                        <label for="passing_marks">Passing Marks</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="is_published" name="is_published" value="true" {% if test.is_published %}checked{% endif %}>
                                        <label class="form-check-label" for="is_published">Publish</label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn btn-primary w-100 py-3">Update Test</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/lib/wow/wow.min.js"></script>
    <script src="/js/main.js"></script>
</body>

</html>
